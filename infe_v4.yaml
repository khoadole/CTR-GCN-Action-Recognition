# ──────────────────────────────────────────────────────────────────────────────
# CTR-GCN Inference Config
# Usage:
#   python infer.py --config infer_config.yaml --input video.mp4
#   python infer.py --config infer_config.yaml --input video.mp4 --output out.mp4 --device 0
# ──────────────────────────────────────────────────────────────────────────────

# ── Model ─────────────────────────────────────────────────────────────────────
model: model.ctrgcn.Model
model_args:
  num_class: 8
  num_point: 17
  num_person: 1
  graph: graph.coco17.Graph
  graph_args:
    labeling_mode: spatial

# Path to the trained .pt checkpoint
# Override at runtime with: --weights /path/to/runs-XX-YY.pt
weights: /home/khoa/GitHub/CTR-GCN-Action-Recognition/work_dir/custom/coco17_8class_v4/joint/runs-3-8757.pt

# ── Input / Output ────────────────────────────────────────────────────────────
# input: single video file, or a folder of videos (mp4/avi/mov/mkv...)
# output_dir: folder where annotated videos will be saved
#   - if input is a file   → output_dir/filename_annotated.mp4
#   - if input is a folder → output_dir/<same filename>_annotated.mp4 for each video
# Both can be overridden at runtime with --input / --output

input: /home/khoa/cxview/video_stream/BOKA/hard_case/catin_test.avi
output_dir: ./sources/OUTPUT/AUG

# ── Class names (must match training CLASS_NAMES order / label id) ─────────────
class_names:
  - "Sit down"      # 0
  - "Lying Down"    # 1
  - "Walking"       # 2
  - "Stand up"      # 3
  - "Standing"      # 4
  - "Fall Down"     # 5
  - "Sitting"       # 6
  - "Other"         # 7

# ── Temporal window ────────────────────────────────────────────────────────────
# Must match the window_size used in build_pkl / training feeder
window_size: 36

# ── Device ────────────────────────────────────────────────────────────────────
# "0"   → cuda:0
# "cpu" → CPU
device: "0"

# ── YOLO pose detector ────────────────────────────────────────────────────────
yolo_model: yolo11m-pose.pt        # path to YOLO weights
yolo_imgsz: 640                    # inference image size
min_kpt_conf: 0.8                 # minimum keypoint confidence (same as extract scripts)
min_valid_kpts: 12                 # frame skipped from buffer if fewer than N kpts are valid (0 = disabled)

# ByteTrack config — "bytetrack.yaml" ships with ultralytics
# You can also use "botsort.yaml"
tracker: bytetrack.yaml