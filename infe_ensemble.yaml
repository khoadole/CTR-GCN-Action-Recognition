# ──────────────────────────────────────────────────────────────────────────────
# CTR-GCN Multi-Stream Ensemble Inference Config
#
# Usage:
#   python infe_ensemble.py --config infe_ensemble.yaml
#   python infe_ensemble.py --config infe_ensemble.yaml --input video.mp4 --output-dir ./results
#   python infe_ensemble.py --config infe_ensemble.yaml --no-vel   # joint + bone only
#   python infe_ensemble.py --config infe_ensemble.yaml --no-bone  # joint + vel  only
# ──────────────────────────────────────────────────────────────────────────────

# ── Model architecture (shared across all streams) ────────────────────────────
model: model.ctrgcn.Model
model_args:
  num_class: 8
  num_point: 17
  num_person: 1
  drop_out: 0.25
  graph: graph.coco17.Graph
  graph_args:
    labeling_mode: spatial

# ── Per-stream checkpoint paths ───────────────────────────────────────────────
# Set a path to enable that stream; leave blank ("") or omit to disable.
# Override at runtime: --joint-weights / --bone-weights / --vel-weights
weights:
  joint: work_dir/custom/coco17_8class_v4/joint/runs-3-8757.pt
  bone:  work_dir/custom/coco17_8class_v4/bone/runs-42-61278_bone.pt   # fill in once bone stream is trained
  vel:   work_dir/custom/coco17_8class_v4/vel/runs-36-105084_vel.pt   # fill in once vel  stream is trained

# ── Ensemble weights (how much each stream contributes to final probs) ────────
# Final probs = alpha_joint * P_joint + alpha_bone * P_bone + alpha_vel * P_vel
# Typical starting point: equal weight 1.0 for joint/bone, 0.5 for vel.
# Tune on your validation set.
alpha:
  joint: 1.0
  bone:  1.0
  vel:   0.5

# ── Input / Output ────────────────────────────────────────────────────────────
# input: single video file, or a folder of videos
# output_dir: folder where annotated videos will be saved (<stem>_ensemble.mp4)
input:      sources/INPUT/BOKA/hard_case/catin_test.avi
output_dir: sources/OUTPUT/combine

# ── Class names (must match training label order) ─────────────────────────────
class_names:
  - "Sit down"      # 0
  - "Lying Down"    # 1
  - "Walking"       # 2
  - "Stand up"      # 3
  - "Standing"      # 4
  - "Fall Down"     # 5
  - "Sitting"       # 6
  - "Other"         # 7

# ── Temporal window ────────────────────────────────────────────────────────────
window_size: 36

# ── Device ────────────────────────────────────────────────────────────────────
device: "0"    # "0" → cuda:0  |  "cpu" → CPU

# ── YOLO pose detector ────────────────────────────────────────────────────────
yolo_model:     yolo11m-pose.pt
yolo_imgsz:     640
min_kpt_conf:   0.6   # min confidence for a single keypoint to count as "valid"
min_valid_kpts: 12    # frame skipped from buffer if fewer than N kpts are valid (0 = disabled)
tracker:        bytetrack.yaml

# ── Bbox aspect-ratio post-processing rule ────────────────────────────────────
# If the model predicts a lying/fallen class but the bounding box is tall
# (h/w > min_h_to_w_ratio), reject that prediction and use the 2nd-best class.
# Useful for top-down camera where a standing person can look similar to lying.
bbox_rules:
  enable:          true        # set to true to activate
  lying_classes:
    - "Lying Down"
    - "Fall Down"
  min_h_to_w_ratio: 1.3         # bbox taller than 1.3× its width → reject lying
