work_dir: ./work_dir/custom/coco17_8class_v4/ctrgcn_joint

feeder: feeders.feeder_custom.Feeder
train_feeder_args:
  data_path: data/csv/npz/coco17_8class_v4.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 36
  normalization: False   # already normalised in build_pkl
  random_rot: True       # NEW — adds rotational augmentation
  p_interval: [0.5, 1]
  vel: False
  bone: False
  num_point: 17
  num_person: 1

test_feeder_args:
  data_path: data/csv/npz/coco17_8class_v4.npz
  split: test
  window_size: 36
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False
  num_point: 17
  num_person: 1

model: model.ctrgcn.Model
model_args:
  num_class: 8
  num_point: 17
  num_person: 1
  graph: graph.coco17.Graph
  graph_args:
    labeling_mode: spatial

weight_decay: 0.0004
base_lr: 0.1
lr_decay_rate: 0.1
step: [35, 55]
warm_up_epoch: 5
nesterov: True

device: [0]
batch_size: 256
test_batch_size: 256
num_epoch: 65
save_epoch: 30
